{% extends 'base.html' %}
{% block title %}Nouveau Transfert — DepôtGest{% endblock %}
{% block page_title %}<i class="bi bi-arrow-left-right me-2"></i>Nouveau transfert entre annexes{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Produit *</label>
                        <select name="produit" class="form-select" required>
                            <option value="">— Choisir un produit —</option>
                            {% for p in produits %}
                            <option value="{{ p.id }}">{{ p.nom }} ({{ p.unite }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Annexe source (départ) *</label>
                        <select name="annexe_source" class="form-select" required>
                            <option value="">— Choisir l'annexe de départ —</option>
                            {% for a in annexes %}
                            <option value="{{ a.id }}">{{ a.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Annexe destination (arrivée) *</label>
                        <select name="annexe_destination" class="form-select" required>
                            <option value="">— Choisir l'annexe d'arrivée —</option>
                            {% for a in annexes %}
                            <option value="{{ a.id }}">{{ a.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Quantité *</label>
                        <div class="input-group">
                            <input type="number" name="quantite" class="form-control"
                                   placeholder="Ex: 10" min="1" required>
                            <span class="input-group-text">unités</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Note</label>
                        <textarea name="note" class="form-control" rows="2"
                                  placeholder="Raison du transfert..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn text-white px-4"
                                style="background:#5a189a;">
                            <i class="bi bi-check-lg me-1"></i> Effectuer le transfert
                        </button>
                        <a href="{% url 'transferts' %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-lg me-1"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
