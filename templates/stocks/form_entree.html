{% extends 'base.html' %}
{% block title %}Nouvelle Entrée — DepôtGest{% endblock %}
{% block page_title %}<i class="bi bi-arrow-down-circle me-2"></i>Enregistrer une entrée de stock{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Produit *</label>
                        <select name="produit" class="form-select" required>
                            <option value="">— Choisir un produit —</option>
                            {% for p in produits %}
                            <option value="{{ p.id }}">{{ p.nom }} ({{ p.unite }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Annexe *</label>
                        <select name="annexe" class="form-select" required>
                            <option value="">— Choisir une annexe —</option>
                            {% for a in annexes %}
                            <option value="{{ a.id }}">{{ a.nom }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Quantité reçue *</label>
                        <div class="input-group">
                            <input type="number" name="quantite" class="form-control"
                                   placeholder="Ex: 50" min="1" required>
                            <span class="input-group-text">unités</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Référence fournisseur</label>
                        <input type="text" name="reference" class="form-control"
                               placeholder="Ex: BL-2026-001">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Note</label>
                        <textarea name="note" class="form-control" rows="2"
                                  placeholder="Observations éventuelles..."></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn text-white px-4"
                                style="background:#1E7E34;">
                            <i class="bi bi-check-lg me-1"></i> Enregistrer
                        </button>
                        <a href="{% url 'entrees_stock' %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-lg me-1"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
