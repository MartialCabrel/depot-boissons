{% extends 'base.html' %}
{% block title %}{% if client %}Modifier{% else %}Ajouter{% endif %} Client{% endblock %}
{% block page_title %}
    <i class="bi bi-person me-2"></i>
    {% if client %}Modifier "{{ client.nom }}"{% else %}Ajouter un client{% endif %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nom *</label>
                        <input type="text" name="nom" class="form-control"
                               placeholder="Ex: Bar Chez Maman"
                               value="{{ client.nom|default:'' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Téléphone</label>
                        <input type="text" name="telephone" class="form-control"
                               placeholder="Ex: 6XX XXX XXX"
                               value="{{ client.telephone|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Adresse</label>
                        <textarea name="adresse" class="form-control" rows="2"
                                  placeholder="Quartier, ville...">{{ client.adresse|default:'' }}</textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Type de client</label>
                        <select name="type_client" class="form-select">
                            <option value="habituel"
                                {% if client.type_client == 'habituel' %}selected{% endif %}>
                                Client habituel
                            </option>
                            <option value="occasionnel"
                                {% if client.type_client == 'occasionnel' %}selected{% endif %}>
                                Client occasionnel
                            </option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn text-white px-4"
                                style="background:#1A376C;">
                            <i class="bi bi-check-lg me-1"></i>
                            {% if client %}Modifier{% else %}Ajouter{% endif %}
                        </button>
                        <a href="{% url 'liste_clients' %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x-lg me-1"></i> Annuler
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
